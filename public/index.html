<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9MAN-x-YAMDHUD | Hacker Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="container">
        <div class="header">
            <h1>⚜️ ༒𝐌𝐑 𝐒𝐔𝐑𝐀𝐉༒⚜️</h1>
            <div class="status-indicator">
                <span class="status-text">System Ready</span>
                <div class="status-led"></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="input-group">
                <label>> Token Option:</label>
                <select id="tokenType" class="hacker-input">
                    <option value="Single">Single Token</option>
                    <option value="Multi">Multi Token</option>
                </select>
            </div>

            <div class="input-group">
                <label>> Access Token:</label>
                <input type="password" id="accessToken" class="hacker-input" placeholder="Enter your Facebook access token">
                <div class="input-hint">[!] Keep this secure</div>
            </div>

            <div class="input-group">
                <label>> Thread ID (Target ID):</label>
                <input type="text" id="threadId" class="hacker-input" placeholder="Enter target thread/user ID">
            </div>

            <div class="input-group">
                <label>> Hater Name (Personalized):</label>
                <input type="text" id="haterName" class="hacker-input" placeholder="e.g., ShadowMaster">
                <div class="input-hint">Use [HATER] in messages</div>
            </div>

            <div class="input-group">
                <label>> Time Interval (seconds):</label>
                <input type="number" id="timeInterval" class="hacker-input" value="2" min="0.5" step="0.5">
            </div>

            <div class="input-group">
                <label>> Upload Message File (.txt):</label>
                <div class="file-upload">
                    <input type="file" id="messageFile" accept=".txt" style="display: none;">
                    <button id="uploadBtn" class="hacker-btn">[ SELECT FILE ]</button>
                    <span id="fileName" class="file-name">No file selected</span>
                </div>
                <div class="input-hint">Each line = one message | Use [HATER] for name insertion</div>
            </div>

            <div class="preview-section">
                <label>> Message Preview:</label>
                <div id="messagePreview" class="preview-window">
                    <span class="placeholder">No messages loaded</span>
                </div>
            </div>

            <div class="action-buttons">
                <button id="startBtn" class="hacker-btn start">[ START ATTACK ]</button>
                <button id="stopBtn" class="hacker-btn stop">[ STOP ATTACK ]</button>
            </div>

            <div class="console-log">
                <label>> System Console:</label>
                <div id="consoleOutput" class="console-window">
                    <div class="log-entry">[>] System initialized</div>
                    <div class="log-entry">[>] Ready for deployment</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
